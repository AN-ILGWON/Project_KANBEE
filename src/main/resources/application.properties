# 애플리케이션 이름 설정
spring.application.name=kanbee

server.port=8087

# MySQL 데이터베이스 연결 설정
# Driver: MySQL용 JDBC 드라이버 사용
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# URL: 로컬 MySQL 서버의 jsl26db 데이터베이스 연결 (없으면 생성, 타임존 UTC 설정)
spring.datasource.url=jdbc:mysql://localhost:3306/jsl26db?createDatabaseIfNotExist=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
# DB 사용자 계정 및 비밀번호
spring.datasource.username=jsl26
spring.datasource.password=1234

# SQL 초기화 설정
# spring.sql.init.mode: always로 설정하여 스키마 변경 사항 적용 (테이블 재생성 포함)
spring.sql.init.mode=always
# SQL 파일 인코딩 설정 (Windows 환경에서 한글/일어 깨짐 방지)
spring.sql.init.encoding=UTF-8
# 에러가 발생해도 계속 진행하지 않음 (문제 발생 시 확실히 알기 위함)
spring.sql.init.continue-on-error=false

# JPA/Hibernate 설정 (데이터 보존을 위해 update 사용)
spring.jpa.hibernate.ddl-auto=none

# MyBatis 관련 설정
# 매퍼 XML 파일들의 위치 지정 (resources/mapper 폴더 내의 모든 xml)
mybatis.mapper-locations=classpath:mapper/**/*.xml
# 모델 클래스들의 패키지 경로 (매퍼에서 resultType 등에 클래스명만 쓸 수 있게 함)
mybatis.type-aliases-package=com.kanbee.project.model
# (Spring Boot 3.5+ 버전에서의 MyBatis NPE 방지를 위해 MyBatisConfig.java에서 추가 설정 진행함)

# Thymeleaf 템플릿 엔진 설정
# 개발 단계에서는 캐시를 꺼서(false) HTML 수정 시 바로 반영되도록 함
spring.thymeleaf.cache=false
# 템플릿 파일들의 위치 및 확장자 설정
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# 인코딩 설정 (모든 HTTP 요청/응답에 UTF-8 적용)
# Spring Boot 2.3+ 부터 server.servlet.encoding.* 사용 권장 (구 spring.http.encoding.* 대체)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# 파일 업로드 관련 설정
# file.upload.path: 실제 서버에 파일이 저장될 물리적 경로
file.upload.path=C:/kanbee/uploads
# uploadPath: 웹상에서 접근할 가상 경로 (URL prefix)
uploadPath=/uploads
# 최대 업로드 가능 파일 크기 및 전체 요청 크기 제한 (10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 정적 리소스(CSS, JS, 이미지 등) 위치 설정
# classpath:/static/ 뿐만 아니라 실제 업로드된 파일 경로도 리소스로 등록
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/,file:C:/kanbee/uploads/

# 다국어 지원(Internationalization, i18n) 설정
# 언어별 메시지 파일의 기본 이름 (messages/messages.properties 등)
spring.messages.basename=messages/messages
# 메시지 파일 인코딩 설정
spring.messages.encoding=UTF-8
# 브라우저 언어 설정이 없을 때 시스템 기본 언어를 사용할지 여부
spring.messages.fallback-to-system-locale=false

# AI Configuration
# 1. OpenAI (Paid): https://platform.openai.com/api-keys
openai.api.key=YOUR_OPENAI_KEY_HERE

# 2. Google Gemini (Free Tier Available): https://aistudio.google.com/app/apikey
gemini.api.key=YOUR_GEMINI_KEY_HERE
