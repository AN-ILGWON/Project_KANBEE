# About Page
about.title=About KANBEE - あなたの完璧な韓国旅行のために
about.hero.meaning=KANBI (完備)
about.hero.title=韓国旅行を「完璧」にする。
about.hero.desc=KANBEEという名前は、日本語の「完備（かんび）」から来ています。<br/>あなたの韓国旅行を完璧に準備し、言語の壁や予約の難しさを取り除くこと。<br/>それが私たちのミッションです。
about.why.title=なぜ KANBEE なのか？
about.why.desc=韓国には魅力的な場所がたくさんありますが、人気のスポットほど韓国の電話番号が必要だったり、本人認証が複雑だったりします。<br/>「行きたかったのに予約できなかった」「言葉が通じなくて諦めた」<br/>そんな経験をさせないために、<b>KANBEE</b>は生まれました。
about.feature1.title=予約代行サービス
about.feature1.desc=レストラン、美容室、ポップアップストア、その他あらゆる場所の予約を代行します。
about.feature2.title=1:1 サポート
about.feature2.desc=現地のプロスタッフが親切に対応します。細かい要望や不安な点も気軽にご相談ください。
about.feature3.title=厳選情報
about.feature3.desc=SNSで話題のホットプレイスから、地元の人しか知らない隠れ家まで、本当におすすめできる場所だけを紹介します。
about.cta.title=旅行の準備は、すべて KANBEE にお任せください。
about.cta.desc=今すぐ会員登録して、予約リクエストを送ってください。あなたの理想の韓国旅行を「完璧に準備」します。
about.cta.btn=今すぐ会員登録

