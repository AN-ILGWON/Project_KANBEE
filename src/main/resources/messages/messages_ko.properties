# About Page
about.title=KANBEE 소개 - 완벽한 한국 여행을 위하여
about.hero.meaning=완비 (KANBI)
about.hero.title=당신의 한국 여행을 '완벽'하게.
about.hero.desc=KANBEE는 '완비(完備)'의 일본어 발음 '칸비'에서 유래했습니다. 한국 여행의 모든 준비를 완벽하게 갖추어 드린다는 의미를 담고 있습니다. 언어의 장벽과 예약의 어려움을 해소하고 최고의 여행 경험을 제공합니다.
about.why.title=왜 KANBEE 인가요?
about.why.desc=한국에는 매력적인 장소가 많지만, 일부 인기 장소나 서비스는 한국 전화번호나 복잡한 인증이 필요한 경우가 있습니다.<br/>"가고 싶었는데 예약할 수 없었다", "말이 통하지 않아 포기했다"<br/>그런 경험을 하지 않도록, 저희 <b>KANBEE</b>가 탄생했습니다.
about.feature1.title=예약 대행 서비스
about.feature1.desc=맛집, 미용실, 팝업 스토어 등 예약이 필요한 모든 곳을 당신을 대신해 예약합니다.
about.feature2.title=1:1 서포트
about.feature2.desc=현지 전문 스태프가 친절하게 대응합니다. 세세한 요청이나 불안한 점도 무엇이든 상담해 주세요.
about.feature3.title=엄선된 정보 제공
about.feature3.desc=SNS에서 화제인 최신 명소부터 현지인만 아는 숨은 명소까지, 정말 추천할 수 있는 장소만 소개합니다.
about.cta.title=여행 준비는 KANBEE에게 맡겨주세요.
about.cta.desc=회원가입을 하고 지금 바로 예약 요청을 보내보세요. 당신의 이상적인 한국 여행을 저희가 '완비'해 드립니다.
about.cta.btn=지금 바로 회원가입

