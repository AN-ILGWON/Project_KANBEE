# About Page
about.title=KANBEEについて - 完備された韓国旅行を
about.hero.meaning=完備 (KANBI)
about.hero.title=あなたの韓国旅行を「完璧」に。
about.hero.desc=KANBEEという名前は、「完備（かんび）」に由来しています。韓国旅行のすべての準備を完璧に整えるという意味が込められています。言葉の壁や予約の難しさを解消し、最高の旅行体験を提供します。
about.why.title=なぜ KANBEE なのか？
about.why.desc=韓国には 魅力的な 場所が たくさんありますが、一部の 人気店や サービスは 韓国の 電話番号や 複雑な 認証が 必要な 場合が あります。<br/>「行きたかったのに 予約が できなかった」「言葉が 通じなくて 諦めた」<br/>そんな 経験を してほしくないという 想いから、私たち <b>KANBEE</b> は 誕生しました。
about.feature1.title=予約代行サービス
about.feature1.desc=グルメ、美容室、ポップアップストアなど、予約が 必要な あらゆる 場所を あなたの 代わりに 予約します.
about.feature2.title=1:1 サポート
about.feature2.desc=現地の プロスタッフが 日本語で 丁寧に 対応。細かい 要望や 不安な 点も、何でも ご相談ください。
about.feature3.title=厳選情報の提供
about.feature3.desc=SNSで 話題の 最新スポットから、地元の 人しか 知らない 穴場まで、本当に オススメできる 場所だけを 紹介します。
about.cta.title=旅の 準備は、KANBEEに お任せください。
about.cta.desc=会員登録を して、今すぐ 予約リクエストを 送ってみましょう。あなたの 理想の 韓国旅行を、私たちが「完備」いたします。
about.cta.btn=今すぐ会員登録

