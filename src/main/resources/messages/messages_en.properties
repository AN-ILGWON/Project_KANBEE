# About Page
about.title=About KANBEE - For Your Perfect Korea Trip
about.hero.meaning=KANBI (完備)
about.hero.title=Making Your Korea Trip "Perfect".
about.hero.desc=The name KANBEE comes from the Japanese word 'Kanbi' (完備), meaning 'fully equipped' or 'perfect preparation'. It reflects our mission to perfectly prepare your trip to Korea, removing language barriers and booking difficulties.
about.why.title=Why KANBEE?
about.why.desc=Korea has many attractive places, but some popular spots require Korean phone numbers or complex verification.<br/>"I wanted to go but couldn't book", "I gave up because of the language barrier"<br/><b>KANBEE</b> was born to prevent such experiences.
about.feature1.title=Reservation Service
about.feature1.desc=We book restaurants, hair salons, popup stores, and anywhere else you need reservations.
about.feature2.title=1:1 Support
about.feature2.desc=Our local professional staff provides friendly support. Feel free to ask about any detailed requests or concerns.
about.feature3.title=Curated Information
about.feature3.desc=From the latest SNS hotspots to hidden gems known only to locals, we introduce only the places we truly recommend.
about.cta.title=Leave Your Trip Preparation to KANBEE.
about.cta.desc=Sign up and send a reservation request now. We will "perfectly prepare" your ideal Korea trip.
about.cta.btn=Sign Up Now

