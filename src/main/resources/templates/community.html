<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{community.title}">KANBEE Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { 
            --kanbee-yellow: #FFD700; 
            --kanbee-warm: #FFF9E3; 
            --kanbee-brown: #5D4037;
        }
        body { background-color: #FFFDF0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        .top-header { background-color: white; padding: 15px 0; border-bottom: 3px solid var(--kanbee-yellow); }
        .kanbee-char-mini { width: 50px; height: 50px; position: relative; cursor: pointer; transition: transform 0.3s; }
        .kanbee-char-mini:hover { transform: scale(1.1); }
        .kanbee-fly-anim { animation: flyAwayMini 1s ease-in-out forwards; pointer-events: none; }
        
        @keyframes flyAwayMini {
            0% { transform: scale(1.1) translate(0, 0); opacity: 1; }
            100% { transform: scale(0.1) translate(200px, -200px); opacity: 0; }
        }

        .bee-body-mini { width: 30px; height: 24px; background: linear-gradient(to bottom, #FFD700 0%, #FFD700 25%, #333 25%, #333 40%, #FFD700 40%, #FFD700 60%, #333 60%, #333 75%, #FFD700 75%); border-radius: 50% 50% 45% 45%; position: absolute; top: 12px; left: 10px; border: 2px solid #333; z-index: 2; }
        .bee-wing-mini { width: 15px; height: 18px; background: rgba(255, 255, 255, 0.9); border: 1px solid #DDD; border-radius: 50%; position: absolute; top: 5px; z-index: 1; }
        .taegeuk-mini { width: 12px; height: 12px; position: absolute; top: 18px; left: 19px; background: linear-gradient(to bottom, #FF0000 50%, #0000FF 50%); border-radius: 50%; border: 1px solid #333; z-index: 3; }
        .bee-eye-mini { width: 3px; height: 3px; background: #333; border-radius: 50%; position: absolute; top: 18px; z-index: 4; }
        .bee-mouth-mini { width: 6px; height: 3px; border-bottom: 1px solid #333; border-radius: 50%; position: absolute; top: 25px; left: 22px; z-index: 4; }
        
        .navbar { background-color: var(--kanbee-yellow); z-index: 1020; }
        .dropdown-menu { z-index: 1050; }
        .post-card { background: white; border-radius: 15px; margin-bottom: 20px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
        .post-category { font-size: 0.8rem; padding: 3px 10px; border-radius: 20px; font-weight: bold; }
        .cat-talk { background: #E3F2FD; color: #1976D2; }
        .cat-question { background: #FFF3E0; color: #F57C00; }
        .cat-info { background: #E8F5E9; color: #388E3C; }
    </style>
</head>
<body>

<div class="top-header">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center fw-bold text-decoration-none text-dark" href="#" onclick="flyKanbeeMini(this); return false;">
            <div class="kanbee-char-mini me-2">
                <div class="bee-wing-mini" style="left: 5px; transform: rotate(-30deg);"></div>
                <div class="bee-wing-mini" style="right: 5px; transform: rotate(30deg);"></div>
                <div class="bee-body-mini"></div>
                <div class="taegeuk-mini"></div>
                <div class="bee-eye-mini" style="left: 15px;"></div>
                <div class="bee-eye-mini" style="right: 15px;"></div>
                <div class="bee-mouth-mini"></div>
            </div>
            KANBEE
        </a>
        <div class="d-flex align-items-center">
            <!-- Language Switcher -->
            <div class="dropdown me-3">
                <button class="btn btn-link btn-sm dropdown-toggle text-decoration-none text-dark fw-bold" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-globe me-1"></i> Language
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
                    <li><a class="dropdown-item small" th:href="@{''(lang='ja')}">🇯🇵 <span th:text="#{lang.ja}">日本語</span></a></li>
                    <li><a class="dropdown-item small" th:href="@{''(lang='en')}">🇺🇸 <span th:text="#{lang.en}">English</span></a></li>
                    <li><a class="dropdown-item small" th:href="@{''(lang='ko')}">🇰🇷 <span th:text="#{lang.ko}">한국어</span></a></li>
                </ul>
            </div>

            <div th:if="${isLoggedIn}">
                <span class="me-3 text-muted small"><span th:text="${userNickname}">ニックネーム</span><span th:text="#{lang.suffix}">さん</span><span th:text="#{header.welcome}">、ようこそ！</span></span>
                <a th:href="@{/mypage}" class="btn btn-warning btn-sm px-3" th:text="#{nav.mypage}">マイページ</a>
                <a th:href="@{/logout}" class="btn btn-outline-secondary btn-sm px-3 ms-2" th:text="#{nav.logout}">ログアウト</a>
            </div>
            <div th:if="${!isLoggedIn}">
                <a th:href="@{/login}" class="btn btn-outline-dark btn-sm px-3" th:text="#{nav.login}">ログイン</a>
            </div>
        </div>
    </div>
</div>

<nav class="navbar navbar-expand-lg sticky-top mb-4">
    <div class="container">
        <div class="navbar-nav w-100 d-flex justify-content-around">
            <a class="nav-link fw-bold" th:href="@{/}" th:text="#{nav.home}">ホーム</a>
            <a class="nav-link fw-bold" th:href="@{/about}" th:text="#{nav.about}">紹介</a>
            <a class="nav-link fw-bold active" th:href="@{/community}" th:text="#{nav.community}">コミュニティ</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold" th:text="#{community.board_title}">コミュニティ掲示板</h2>
                <a th:href="@{/community/write}" class="btn btn-warning fw-bold rounded-pill" th:text="#{community.write.submit}">投稿する</a>
            </div>

            <div th:if="${#lists.isEmpty(posts)}" class="text-center py-5 text-muted">
                <i class="bi bi-chat-dots display-1 d-block mb-3"></i>
                <p th:text="#{community.no_posts}">投稿がありません。</p>
            </div>

            <div th:each="post : ${posts}" class="post-card card" th:onclick="|location.href='@{/community/post/{id}(id=${post.id})}'|" style="cursor: pointer;">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-9">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="post-category cat-talk" th:classappend="${post.category != null ? 'cat-' + #strings.toLowerCase(post.category) : 'cat-talk'}" th:text="${post.category}">お喋り</span>
                                <small class="text-muted" th:text="${post.createdAt != null ? #temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm') : ''}">2026-02-12</small>
                            </div>
                            <h4 class="fw-bold mb-2 text-truncate" th:text="${post.title}">記事のタイトル</h4>
                            <p class="text-muted text-truncate" th:text="${post.content}">記事の内容プレビュー...</p>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <span class="small fw-bold"><i class="bi bi-person"></i> <span th:text="${post.nickname}">投稿者</span></span>
                                <span class="small text-muted"><i class="bi bi-chat-left-text"></i> <span th:text="${#lists.size(post.comments)}">0</span></span>
                            </div>
                        </div>
                        <div class="col-md-3 d-flex align-items-center justify-content-center" th:if="${post.imageUrl != null}">
                            <img th:src="${post.imageUrl}" class="img-fluid rounded" style="width: 100%; height: 100px; object-fit: cover;" alt="Thumbnail">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-none shadow-sm rounded-4 p-3 mb-4">
                <h5 class="fw-bold mb-3" th:text="#{community.search_placeholder}">検索...</h5>
                <div class="input-group">
                    <input type="text" class="form-control rounded-start-pill" th:placeholder="#{community.search_placeholder}">
                    <button class="btn btn-warning rounded-end-pill px-3"><i class="bi bi-search"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    function flyKanbeeMini(element) {
        const char = element.querySelector('.kanbee-char-mini');
        char.classList.add('kanbee-fly-anim');
        setTimeout(() => {
            window.location.href = '/';
        }, 800);
    }
</script>
</body>
</html>
