<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<footer th:fragment="footer" class="py-5 mt-5" style="background-color: #FFF9E3; border-top: 2px solid #FFD700; color: #5D4037;">
    <div class="container position-relative">
        <div class="row align-items-center mb-4">
            <!-- Left: Logo & Links -->
            <div class="col-md-9 d-flex flex-wrap align-items-center">
                <a href="/" class="text-decoration-none me-4 mb-2">
                    <!-- Simple Text Logo matching header style -->
                    <span class="fw-bold fs-4" style="color: #FFD700; text-shadow: 1px 1px 0 #5D4037; font-family: sans-serif;">KANBEE</span>
                </a>
                <div class="footer-links mb-2">
                    <a href="/policy/terms" class="text-decoration-none me-3" style="color: #5D4037;" th:text="#{footer.terms}">Terms of Service</a>
                    <a href="/policy/privacy" class="text-decoration-none fw-bold me-3" style="color: #D32F2F;" th:text="#{footer.privacy}">Privacy Policy</a>
                    <a href="/policy/youth-protection" class="text-decoration-none me-3" style="color: #5D4037;" th:text="#{footer.youth_protection}">Youth Protection Policy</a>
                    <a href="/policy/copyright" class="text-decoration-none me-3" style="color: #5D4037;" th:text="#{footer.copyright_policy}">Copyright Policy</a>
                    <a href="/policy/email-refusal" class="text-decoration-none me-3" style="color: #5D4037;" th:text="#{footer.email_refusal}">Email Refusal</a>
                </div>
            </div>

            <!-- Right: Family Site -->
            <div class="col-md-3 text-md-end mb-2">
                <div class="d-inline-block">
                    <select class="form-select form-select-sm border-secondary text-secondary" style="min-width: 150px;" onchange="if(this.value) { window.open(this.value, '_blank'); this.selectedIndex=0; }">
                        <option selected disabled th:text="#{footer.family_site}">Family Site</option>
                        <option value="https://japanese.visitkorea.or.kr/svc/main/index.do">Visit Korea (JP)</option>
                        <option value="https://www.hotelscombined.co.kr/">HotelsCombined</option>
                        <option value="https://hotels.naver.com/">Naver Hotel</option>
                        <option value="https://www.booking.com/index.ko.html?label=gen173rf-10CAEoggI46AdSAmpwWANofYgBAZgBM7gBF8gBDNgBA-gBAfgBAYgCAaICCW5hbXUud2lraagCAbgCrNTpzAbAAgHSAiRlYWM4YTVmNC1iZDk3LTRmYTMtYjJlNS1iNTUxZjY5ODA3ZTDYAgHgAgE&amp;sid=3c10ecd919e4486c04a28747c05c710f&amp;aid=304142">Booking.com</option>
                        <option value="https://www.agoda.com/?ds=UZW9W3CwJ9n4MC1g">Agoda</option>
                        <option value="https://www.ticketlink.co.kr/">Ticketlink</option>
                        <option value="https://ticket.melon.com/">Melon Ticket</option>
                        <option value="http://ticket.yes24.com/">Yes24 Ticket</option>
                    </select>
                </div>
            </div>
        </div>

        <hr class="opacity-25" style="border-color: #5D4037;">

        <div class="row">
            <!-- Info Text -->
            <div class="col-md-10 text-muted small" style="line-height: 1.8;">
                <p class="mb-1">
                    <strong th:text="#{footer.address}" class="me-2">Address</strong>
                    <span class="mx-1">|</span>
                    <span th:text="#{footer.ceo}" class="mx-1">CEO</span>
                    <span class="mx-1">|</span>
                    <span th:text="#{footer.tel}" class="mx-1">TEL</span>
                    <span class="mx-1">|</span>
                    <span th:text="#{footer.registration}">Reg No</span>
                </p>
                <p class="mb-0 fw-bold" th:text="#{footer.copyright}">Copyright</p>
            </div>
            
            <!-- Cert Logo (WA) -->
            <div class="col-md-2 text-end">
                <i class="bi bi-patch-check-fill fs-1 text-success opacity-75" title="Verified"></i>
            </div>
        </div>

        <!-- Scroll Top Button -->
        <button id="scrollTopBtn" onclick="scrollToTop()" class="btn rounded-circle shadow position-fixed bottom-0 end-0 m-4" 
                style="width: 50px; height: 50px; background-color: #5D4037; color: #FFF; display: none; z-index: 9999; border: 2px solid #FFD700;">
            <i class="bi bi-arrow-up fw-bold"></i>
        </button>
    </div>

    <script>
        // Scroll to top logic
        window.addEventListener('scroll', function() {
            var scrollBtn = document.getElementById("scrollTopBtn");
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
                scrollBtn.style.display = "block";
            } else {
                scrollBtn.style.display = "none";
            }
        });

        function scrollToTop() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</footer>
</body>
</html>
