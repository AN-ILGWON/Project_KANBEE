<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{community.edit.title}">게시글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { 
            --kanbee-yellow: #FFD700; 
            --kanbee-warm: #FFF9E3; 
            --kanbee-brown: #5D4037;
        }
        body { background-color: #FFFDF0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        .top-header { background-color: white; padding: 15px 0; border-bottom: 3px solid var(--kanbee-yellow); }
        .kanbee-char-mini { width: 50px; height: 50px; position: relative; cursor: pointer; }
        .bee-body-mini { width: 30px; height: 24px; background: linear-gradient(to bottom, #FFD700 0%, #FFD700 25%, #333 25%, #333 40%, #FFD700 40%, #FFD700 60%, #333 60%, #333 75%, #FFD700 75%); border-radius: 50% 50% 45% 45%; position: absolute; top: 12px; left: 10px; border: 2px solid #333; z-index: 2; }
        .bee-wing-mini { width: 15px; height: 18px; background: rgba(255, 255, 255, 0.9); border: 1px solid #DDD; border-radius: 50%; position: absolute; top: 5px; z-index: 1; }
        .taegeuk-mini { width: 12px; height: 12px; position: absolute; top: 18px; left: 19px; background: linear-gradient(to bottom, #FF0000 50%, #0000FF 50%); border-radius: 50%; border: 1px solid #333; z-index: 3; }
        .bee-eye-mini { width: 3px; height: 3px; background: #333; border-radius: 50%; position: absolute; top: 18px; z-index: 4; }
        
        .navbar { background-color: var(--kanbee-yellow); z-index: 1020; }
        .write-card { background: white; border-radius: 15px; padding: 40px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-label { font-weight: bold; color: var(--kanbee-brown); }
        .btn-warning { background-color: var(--kanbee-yellow); border: none; color: var(--kanbee-brown); }
        .btn-warning:hover { background-color: #FFC107; color: black; }
        
        .custom-file-button input[type=file] { display: none; }
        .custom-file-button label { cursor: pointer; }
    </style>
</head>
<body>

<div class="top-header">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center fw-bold text-decoration-none text-dark" th:href="@{/}">
            <div class="kanbee-char-mini me-2">
                <div class="bee-wing-mini" style="left: 5px; transform: rotate(-30deg);"></div>
                <div class="bee-wing-mini" style="right: 5px; transform: rotate(30deg);"></div>
                <div class="bee-body-mini"></div>
                <div class="taegeuk-mini"></div>
                <div class="bee-eye-mini" style="left: 15px;"></div>
                <div class="bee-eye-mini" style="right: 15px;"></div>
            </div>
            KANBEE
        </a>
        <div class="d-flex align-items-center">
            <div th:if="${isLoggedIn}">
                <span class="me-3 text-muted small"><span th:text="${userNickname}">Nick</span><span th:text="#{lang.suffix}">さん</span></span>
                <a th:href="@{/mypage}" class="btn btn-warning btn-sm px-3" th:text="#{nav.mypage}">マイページ</a>
                <a th:href="@{/logout}" class="btn btn-outline-secondary btn-sm px-3 ms-2" th:text="#{nav.logout}">ログアウト</a>
            </div>
            <div th:if="${!isLoggedIn}">
                <a th:href="@{/login}" class="btn btn-outline-dark btn-sm px-3" th:text="#{nav.login}">ログイン</a>
            </div>
        </div>
    </div>
</div>

<nav class="navbar navbar-expand-lg sticky-top mb-4">
    <div class="container">
        <div class="navbar-nav w-100 d-flex justify-content-around">
            <a class="nav-link fw-bold" th:href="@{/}" th:text="#{nav.home}">ホーム</a>
            <a class="nav-link fw-bold" th:href="@{/about}" th:text="#{nav.about}">紹介</a>
            <a class="nav-link fw-bold active" th:href="@{/community}" th:text="#{nav.community}">コミュニティ</a>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="mb-4">
                <a th:href="@{/community}" class="text-decoration-none text-muted fw-bold">
                    <i class="bi bi-arrow-left"></i> <span th:text="#{community.board_title}">コミュニティ掲示板</span>
                </a>
            </div>

            <div class="write-card">
                <h2 class="mb-4 fw-bold text-center"><i class="bi bi-pencil-square text-warning"></i> <span th:text="#{community.edit.title}">Edit Post</span></h2>
                
                <form th:action="@{/community/edit/{id}(id=${post.id})}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="category" class="form-label" th:text="#{community.write.category}">카테고리</label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="TALK" th:selected="${post.category == 'TALK'}" th:text="#{community.category.talk}">수다</option>
                            <option value="QUESTION" th:selected="${post.category == 'QUESTION'}" th:text="#{community.category.question}">질문</option>
                            <option value="TIP" th:selected="${post.category == 'TIP'}" th:text="#{community.category.tip}">꿀팁</option>
                            <option value="INFO" th:selected="${post.category == 'INFO'}" th:text="#{community.category.info}">정보</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="title" class="form-label" th:text="#{community.write.post_title}">제목</label>
                        <input type="text" class="form-control" id="title" name="title" th:value="${post.title}" required>
                    </div>

                    <div class="mb-3">
                        <label for="content" class="form-label" th:text="#{community.write.content}">내용</label>
                        <textarea class="form-control" id="content" name="content" rows="10" required th:text="${post.content}"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" th:text="#{community.write.file_label}">사진 변경 (선택)</label>
                        <div class="input-group custom-file-button">
                            <label class="input-group-text bg-light" for="file"><i class="bi bi-camera me-2"></i> <span th:text="#{modal.file.choose}">Choose File</span></label>
                            <input type="file" class="form-control" id="file" name="file" onchange="updateFileName(this)">
                            <input type="text" class="form-control bg-white" id="fileName" th:placeholder="#{modal.file.none}" readonly onclick="document.getElementById('file').click()">
                        </div>
                        <div th:if="${post.imageUrl}" class="mt-2">
                            <small class="text-muted">현재 이미지: <a th:href="${post.imageUrl}" target="_blank">보기</a></small>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a th:href="@{/community/post/{id}(id=${post.id})}" class="btn btn-light me-md-2 fw-bold" th:text="#{community.write.cancel}">취소</a>
                        <button type="submit" class="btn btn-warning fw-bold px-4" th:text="#{community.edit.submit}">수정완료</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function updateFileName(input) {
        if (input.files && input.files.length > 0) {
            document.getElementById('fileName').value = input.files[0].name;
        }
    }
</script>
</body>
</html>
